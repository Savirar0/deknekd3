<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DekNek3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVIGATION -->
  <nav>
    <a href="index.html" class="nav-logo">Dek<span>Nek</span>3D</a>
    <a href="index.html" class="nav-link">Feed</a>
    <div id="nav-auth"></div>
  </nav>

  <!-- LOGIN FORM -->
  <div class="auth-wrap">
    <div class="auth-box">

      <h2>Welcome back</h2>
      <p>Log in to your DekNek3D account</p>

      <div class="msg" id="msg"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn btn-primary" id="login-btn" onclick="login()">Log In</button>

      <p class="auth-switch">
        Don't have an account? <a href="signup.html">Sign up</a>
      </p>

    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>

    // If already logged in, redirect to feed
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    initNav();

    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('login-btn');
      const msg      = document.getElementById('msg');

      msg.className = 'msg';
      msg.textContent = '';

      if (!email || !password) {
        msg.textContent = 'Please fill in all fields.';
        msg.className = 'msg error';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        msg.textContent = error.message;
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Log In';
      } else {
        window.location.href = 'index.html';
      }
    }

    // Allow pressing Enter to submit
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });

  </script>

</body>
</html>
